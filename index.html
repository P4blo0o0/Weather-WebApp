<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Weather • Local & Mobile</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(145deg, #1a1f2e 0%, #2a2f4a 100%);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #fff;
            padding: 12px;
            position: relative;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 30% 40%, rgba(120,140,255,0.15) 0%, transparent 50%);
            animation: slowRotate 40s linear infinite;
            pointer-events: none;
            z-index: 0;
        }

        @keyframes slowRotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* location modal — mobile friendly */
        .location-modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(10, 15, 30, 0.8);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            padding: 16px;
        }

        .location-modal.active {
            display: flex;
        }

        .modal-content {
            background: rgba(30, 35, 55, 0.9);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            padding: 32px 24px;
            border-radius: 36px;
            max-width: 380px;
            width: 100%;
            text-align: center;
            box-shadow: 0 25px 40px rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.15);
            animation: slideUpMobile 0.3s ease;
        }

        @keyframes slideUpMobile {
            from { transform: translateY(30px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .modal-icon {
            font-size: 58px;
            color: #aab9ff;
            margin-bottom: 18px;
            filter: drop-shadow(0 4px 8px rgba(0,0,0,0.3));
        }

        .modal-content h2 {
            font-size: 26px;
            margin-bottom: 12px;
            font-weight: 700;
            letter-spacing: -0.01em;
        }

        .modal-content p {
            margin-bottom: 20px;
            opacity: 0.9;
            line-height: 1.5;
            font-size: 15px;
        }

        .modal-buttons {
            display: flex;
            gap: 12px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .modal-btn {
            padding: 14px 20px;
            border: none;
            border-radius: 40px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            flex: 1 1 120px;
            background: rgba(255,255,255,0.1);
            color: white;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.15);
        }

        .modal-btn.primary {
            background: linear-gradient(135deg, #5f7aff, #9f7aff);
            border: none;
            box-shadow: 0 8px 18px rgba(79, 102, 255, 0.3);
        }

        .modal-btn.primary:hover {
            transform: scale(0.98);
            box-shadow: 0 6px 14px rgba(79, 102, 255, 0.4);
        }

        /* main container — mobile first */
        #weather-container {
            background: rgba(25, 30, 48, 0.65);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 22px 18px;
            border-radius: 40px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            width: 100%;
            max-width: 480px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            position: relative;
            z-index: 10;
            transition: all 0.2s;
        }

        .location-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 8px;
        }

        .location-info {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(0,0,0,0.2);
            padding: 8px 16px;
            border-radius: 40px;
            backdrop-filter: blur(5px);
        }

        .location-info i {
            font-size: 16px;
            color: #b1c5ff;
        }

        #location-name {
            font-size: 16px;
            font-weight: 600;
            max-width: 170px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .location-btn {
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.2);
            color: white;
            padding: 8px 16px;
            border-radius: 40px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            gap: 6px;
            transition: 0.2s;
        }

        .location-btn i {
            font-size: 14px;
        }

        .location-btn:active {
            background: rgba(255,255,255,0.2);
            transform: scale(0.96);
        }

        .search-section {
            margin-bottom: 20px;
        }

        .input-group {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .input-group input {
            padding: 16px 18px;
            border: none;
            border-radius: 44px;
            font-size: 16px;
            background: rgba(10, 15, 30, 0.7);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            color: white;
            flex: 1;
            min-width: 0;
            border: 1px solid rgba(255,255,255,0.2);
            font-weight: 400;
        }

        .input-group input::placeholder {
            color: rgba(255,255,255,0.6);
        }

        .input-group input:focus {
            outline: none;
            border-color: #7a9bff;
            background: rgba(20, 30, 55, 0.8);
        }

        .input-group button {
            padding: 16px;
            width: 56px;
            height: 56px;
            border: none;
            border-radius: 56px;
            background: linear-gradient(145deg, #5f7aff, #7a5fff);
            color: white;
            font-size: 20px;
            cursor: pointer;
            box-shadow: 0 6px 14px rgba(79, 102, 255, 0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.2s;
        }

        .input-group button:active {
            transform: scale(0.92);
        }

        .loading {
            text-align: center;
            padding: 24px;
            display: none;
        }
        .loading.active { display: block; }
        .spinner {
            border: 3px solid rgba(255,255,255,0.15);
            border-top: 3px solid white;
            border-radius: 50%;
            width: 44px;
            height: 44px;
            animation: spin 0.9s linear infinite;
            margin: 0 auto;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        #weather-display { transition: opacity 0.2s; }

        .current-weather {
            text-align: center;
            margin-bottom: 18px;
        }
        #weather-icon {
            width: 130px;
            height: 130px;
            margin: 0 auto;
            filter: drop-shadow(0 8px 18px rgba(0,0,0,0.5));
        }
        #temp-div p {
            font-size: 64px;
            font-weight: 700;
            margin: 5px 0;
            letter-spacing: -0.02em;
            background: linear-gradient(135deg, #fff, #e0e5ff);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        #weather-info {
            background: rgba(0, 0, 0, 0.2);
            border-radius: 28px;
            padding: 18px 14px;
            margin: 16px 0 20px;
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255,255,255,0.1);
        }

        .weather-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }
        .weather-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 12px 6px;
            background: rgba(255,255,255,0.05);
            border-radius: 22px;
            transition: 0.15s;
        }
        .weather-item i { font-size: 22px; margin-bottom: 6px; color: #b1c9ff; }
        .weather-item .label { font-size: 13px; opacity: 0.75; }
        .weather-item .value { font-size: 20px; font-weight: 600; }

        .forecast-title {
            font-size: 18px;
            font-weight: 600;
            margin: 8px 0 14px;
            display: flex;
            align-items: center;
            gap: 10px;
            padding-left: 4px;
        }
        .forecast-title i { color: #b1c9ff; }

        #hourly-forecast {
            display: flex;
            overflow-x: auto;
            gap: 12px;
            padding-bottom: 12px;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: thin;
            scrollbar-color: rgba(255,255,255,0.4) transparent;
        }
        #hourly-forecast::-webkit-scrollbar { height: 4px; }
        #hourly-forecast::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.4); border-radius: 20px; }

        .hourly-item {
            background: rgba(20, 25, 45, 0.6);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 28px;
            padding: 16px 12px;
            min-width: 90px;
            color: white;
            font-size: 14px;
            display: flex;
            flex-direction: column;
            align-items: center;
            border: 1px solid rgba(255,255,255,0.08);
            flex-shrink: 0;
        }
        .hourly-item .time { font-weight: 600; margin-bottom: 6px; }
        .hourly-item img { width: 48px; height: 48px; margin: 4px 0; }
        .hourly-item .temp { font-size: 20px; font-weight: 700; }
        .hourly-item .description { font-size: 12px; opacity: 0.85; text-transform: capitalize; }

        .error-message, .welcome-message {
            background: rgba(180, 70, 70, 0.2);
            border-radius: 28px;
            padding: 24px 16px;
            text-align: center;
            backdrop-filter: blur(8px);
        }
        .welcome-message { background: rgba(40, 45, 80, 0.5); }
        .enable-location-btn {
            background: linear-gradient(145deg, #5f7aff, #7a5fff);
            border: none;
            color: white;
            padding: 14px 24px;
            border-radius: 60px;
            font-weight: 600;
            font-size: 16px;
            margin-top: 16px;
            cursor: pointer;
            box-shadow: 0 8px 18px rgba(79, 102, 255, 0.4);
            border: 1px solid rgba(255,255,255,0.2);
            width: fit-content;
            margin-left: auto;
            margin-right: auto;
        }

        /* extra mobile touches */
        @media (max-width: 400px) {
            #weather-container { padding: 18px 14px; }
            .location-info { padding: 6px 12px; }
            #location-name { max-width: 130px; font-size: 15px; }
            .input-group input { padding: 14px 16px; }
            .input-group button { width: 52px; height: 52px; }
            .weather-grid { gap: 8px; }
            .hourly-item { min-width: 80px; padding: 14px 8px; }
        }
    </style>
</head>
<body>
    <!-- Mobile friendly location modal -->
    <div class="location-modal" id="locationModal">
        <div class="modal-content">
            <div class="modal-icon"><i class="fas fa-map-pin"></i></div>
            <h2>Use your location</h2>
            <p>Get accurate weather for where you are — we only use it to show forecasts.</p>
            <p style="font-size: 14px; opacity: 0.7;">Works great on smartphones.</p>
            <div class="modal-buttons">
                <button class="modal-btn primary" onclick="requestLocationPermission()"><i class="fas fa-location-dot"></i> Allow</button>
                <button class="modal-btn secondary" onclick="denyLocationAccess()">Not now</button>
            </div>
        </div>
    </div>

    <div id="weather-container">
        <div class="location-header">
            <div class="location-info">
                <i class="fas fa-map-marker-alt"></i>
                <span id="location-name">Set location</span>
            </div>
            <button class="location-btn" onclick="showLocationModal()">
                <i class="fas fa-location-arrow"></i> My location
            </button>
        </div>

        <div class="search-section">
            <div class="input-group">
                <input type="text" id="city" placeholder="Search city..." enterkeyhint="search" onkeypress="handleKeyPress(event)">
                <button onclick="searchWeather()" aria-label="Search"><i class="fas fa-search"></i></button>
            </div>
        </div>

        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p style="margin-top: 16px;">Loading forecast...</p>
        </div>

        <div id="weather-display">
            <div class="current-weather">
                <img id="weather-icon" style="display: none;">
                <div id="temp-div"></div>
            </div>
            <div id="weather-info">
                <div class="welcome-message">
                    <i class="fas fa-cloud-sun" style="font-size: 48px; margin-bottom: 16px; opacity: 0.9;"></i>
                    <h3 style="font-size: 20px;">Mobile ready</h3>
                    <p>Tap "My location" or search any city</p>
                    <button class="enable-location-btn" onclick="showLocationModal()"><i class="fas fa-map-marker-alt"></i> Use precise location</button>
                </div>
            </div>
            <div class="forecast-title"><i class="fas fa-clock"></i><span>Hourly forecast</span></div>
            <div id="hourly-forecast"></div>
        </div>
    </div>

    <script>
        const apiKey = '22454ffebf8e9eeb302c90f15391556e';
        let locationPermissionGranted = false;

        (function initMobileMeta(){
            // ensure viewport and touch behavior
            const viewport = document.querySelector('meta[name="viewport"]');
            if(viewport) viewport.setAttribute('content', 'width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover');
        })();

        window.addEventListener('load', () => {
            const pref = localStorage.getItem('locationPreference');
            if (pref === 'granted') {
                requestLocationPermission();
            } else if (pref === 'denied') {
                updateLocationDisplay('Location off');
            } else {
                setTimeout(() => showLocationModal(), 400);
            }
        });

        function showLocationModal() { document.getElementById('locationModal').classList.add('active'); }
        function hideLocationModal() { document.getElementById('locationModal').classList.remove('active'); }

        function requestLocationPermission() {
            hideLocationModal();
            if (!navigator.geolocation) {
                alert('Geolocation not supported.');
                updateLocationDisplay('Not supported');
                return;
            }
            showLoading();
            updateLocationDisplay('Locating...');

            navigator.geolocation.getCurrentPosition(
                (pos) => {
                    locationPermissionGranted = true;
                    localStorage.setItem('locationPreference', 'granted');
                    const { latitude, longitude } = pos.coords;
                    getWeatherByCoords(latitude, longitude);
                    getLocationName(latitude, longitude);
                },
                (error) => {
                    locationPermissionGranted = false;
                    localStorage.setItem('locationPreference', 'denied');
                    hideLoading();
                    let msg = 'Location denied. Search manually.';
                    if(error.code === 1) msg = 'Location permission denied. You can search instead.';
                    else if(error.code === 2) msg = 'Location unavailable.';
                    else if(error.code === 3) msg = 'Location timeout.';
                    updateLocationDisplay('Access denied');
                    showLocationError(msg);
                },
                { enableHighAccuracy: true, timeout: 8000, maximumAge: 30000 }
            );
        }

        function denyLocationAccess() {
            hideLocationModal();
            localStorage.setItem('locationPreference', 'denied');
            updateLocationDisplay('Search for city');
            const infoDiv = document.getElementById('weather-info');
            infoDiv.innerHTML = `<div class="welcome-message"><i class="fas fa-map"></i><h3>Manual mode</h3><p>Search above or tap "My location"</p><button class="enable-location-btn" onclick="showLocationModal()"><i class="fas fa-location-dot"></i> Enable location</button></div>`;
        }

        function handleKeyPress(e) { if (e.key === 'Enter') searchWeather(); }

        function getLocationName(lat, lon) {
            fetch(`https://api.openweathermap.org/geo/1.0/reverse?lat=${lat}&lon=${lon}&limit=1&appid=${apiKey}`)
                .then(r => r.json()).then(d => {
                    if(d && d[0]) updateLocationDisplay(`${d[0].name}, ${d[0].country}`);
                    else updateLocationDisplay('Current location');
                }).catch(() => updateLocationDisplay('Current location'));
        }

        function updateLocationDisplay(text) { document.getElementById('location-name').textContent = text; }

        function showLocationError(msg) {
            const infoDiv = document.getElementById('weather-info');
            infoDiv.innerHTML = `<div class="error-message"><i class="fas fa-exclamation-triangle"></i><p>${msg}</p><button class="enable-location-btn" onclick="showLocationModal()">Try again</button></div>`;
            document.getElementById('temp-div').innerHTML = '';
            document.getElementById('weather-icon').style.display = 'none';
        }

        function getWeatherByCoords(lat, lon) {
            const cur = `https://api.openweathermap.org/data/2.5/weather?lat=${lat}&lon=${lon}&appid=${apiKey}`;
            const fore = `https://api.openweathermap.org/data/2.5/forecast?lat=${lat}&lon=${lat}&appid=${apiKey}`; // fix: use lat,lon correctly
            const forecastUrl = `https://api.openweathermap.org/data/2.5/forecast?lat=${lat}&lon=${lon}&appid=${apiKey}`;
            Promise.all([fetch(cur).then(r=>r.json()), fetch(forecastUrl).then(r=>r.json())])
                .then(([w,f]) => { displayWeather(w); displayHourlyForecast(f.list); hideLoading(); })
                .catch(e => { hideLoading(); showLocationError('Network error. Try again.'); });
        }

        function getWeatherByCity(city) {
            const cur = `https://api.openweathermap.org/data/2.5/weather?q=${city}&appid=${apiKey}`;
            const fore = `https://api.openweathermap.org/data/2.5/forecast?q=${city}&appid=${apiKey}`;
            Promise.all([fetch(cur).then(r=>r.json()), fetch(fore).then(r=>r.json())])
                .then(([w,f]) => {
                    if(w.cod === '404') { showLocationError('City not found'); return; }
                    displayWeather(w); displayHourlyForecast(f.list);
                    updateLocationDisplay(`${w.name}, ${w.sys.country}`);
                    hideLoading();
                }).catch(() => { hideLoading(); showLocationError('Unable to load. Check connection.'); });
        }

        function searchWeather() {
            const city = document.getElementById('city').value.trim();
            if(!city) { alert('Enter a city name'); return; }
            showLoading(); getWeatherByCity(city);
            document.getElementById('city').value = '';
        }

        function displayWeather(data) {
            if(data.cod === '404') { showLocationError(data.message); return; }
            const tempC = Math.round(data.main.temp - 273.15);
            const desc = data.weather[0].description;
            const icon = data.weather[0].icon;
            const humidity = data.main.humidity;
            const wind = (data.wind.speed * 3.6).toFixed(1);
            const pressure = data.main.pressure;
            const feels = Math.round(data.main.feels_like - 273.15);
            const visibility = (data.visibility / 1000).toFixed(1);
            
            document.getElementById('temp-div').innerHTML = `<p>${tempC}°C</p>`;
            document.getElementById('weather-info').innerHTML = `
                <div class="weather-grid">
                    <div class="weather-item"><i class="fas fa-thermometer-half"></i><span class="label">Feels like</span><span class="value">${feels}°C</span></div>
                    <div class="weather-item"><i class="fas fa-droplet"></i><span class="label">Humidity</span><span class="value">${humidity}%</span></div>
                    <div class="weather-item"><i class="fas fa-wind"></i><span class="label">Wind</span><span class="value">${wind} km/h</span></div>
                    <div class="weather-item"><i class="fas fa-gauge-high"></i><span class="label">Pressure</span><span class="value">${pressure} hPa</span></div>
                    <div class="weather-item"><i class="fas fa-eye"></i><span class="label">Visibility</span><span class="value">${visibility} km</span></div>
                    <div class="weather-item"><i class="fas fa-cloud"></i><span class="label">Condition</span><span class="value" style="text-transform:capitalize;">${desc}</span></div>
                </div>`;
            const iconImg = document.getElementById('weather-icon');
            iconImg.src = `https://openweathermap.org/img/wn/${icon}@4x.png`;
            iconImg.alt = desc;
            iconImg.style.display = 'block';
        }

        function displayHourlyForecast(list) {
            const container = document.getElementById('hourly-forecast');
            container.innerHTML = '';
            const next8 = list.slice(0,8);
            next8.forEach(item => {
                const d = new Date(item.dt * 1000);
                const hour = d.getHours().toString().padStart(2,'0')+':00';
                const temp = Math.round(item.main.temp - 273.15);
                const icon = item.weather[0].icon;
                const desc = item.weather[0].description;
                const dayLabel = d.getDate() === new Date().getDate() ? 'Today' : 'Tomorrow';
                const el = document.createElement('div'); el.className = 'hourly-item';
                el.innerHTML = `<span class="time">${hour}</span><img src="https://openweathermap.org/img/wn/${icon}.png" alt="${desc}"><span class="temp">${temp}°C</span><span class="description">${desc}</span><span style="font-size:11px;opacity:0.7;">${dayLabel}</span>`;
                container.appendChild(el);
            });
        }

        function showLoading() {
            document.getElementById('loading').classList.add('active');
            document.getElementById('weather-display').style.opacity = '0.5';
        }
        function hideLoading() {
            document.getElementById('loading').classList.remove('active');
            document.getElementById('weather-display').style.opacity = '1';
        }
    </script>
</body>
</html>
